name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug SSH key
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_HOST: 178.159.242.118
        SSH_USER: user2142861
        SSH_PORT: 22
      run: |
        echo "Testing SSH connection..."
        echo "$SSH_KEY" > /tmp/debug_key
        chmod 600 /tmp/debug_key
        ssh -v -p 22 -i /tmp/debug_key \
          -o StrictHostKeyChecking=no \
          user2142861@178.159.242.118 \
          "echo 'Connection successful'"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 178.159.242.118
        username: user2142861
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd www/jelezo.by/TEST
          git pull origin main
          chmod -R 755 assets/uploads