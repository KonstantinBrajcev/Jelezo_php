name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass
    
    - name: Add host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy via SSH
      run: |
        sshpass -e ssh -v -o StrictHostKeyChecking=no -o PreferredAuthentications=password \
          -o PubkeyAuthentication=no -p ${{ secrets.SERVER_PORT }} \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "cd www/jelezo.by/TEST && git pull origin main && chmod -R 755 assets/uploads"
      env:
        SSHPASS: ${{ secrets.SERVER_PASSWORD }}