name: 🚀 Deploy via FTP

on:
  push:
    branches: [main, master]

jobs:
  ftp-deploy:
    name: 📂 Upload to server via FTP
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Get latest code
        uses: actions/checkout@v4  # Используем v4 вместо v3
        
      - name: 📤 Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./  # Корень вашего репозитория
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/** 
            **/.github/**
            **/node_modules/**
            **/*.log
            .env
          log-level: standard  # Для отладки, потом можно сменить на minimal
          # Если нужен FTPS (защищенный):
          # protocol: ftps
          # security: strict