name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create deployment package
      run: |
        tar -czf deploy.tar.gz --exclude=.git --exclude=.github .
    
    - name: Copy files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 178.159.242.118
        username: user2142861
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "deploy.tar.gz"
        target: "www/jelezo.by/TEMP"
        strip_components: 0
    
    - name: Extract files on server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 178.159.242.118
        username: user2142861
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd www/jelezo.by
          # Создаем папку TEST если её нет
          mkdir -p TEST
          # Распаковываем архив
          tar -xzf TEMP/deploy.tar.gz -C TEST/
          # Удаляем архив
          rm -rf TEMP
          # Права доступа
          chmod -R 755 TEST/assets/uploads || true
          cd TEST
          echo "Deployment completed at $(date)" > deployment.log