name: Deploy to Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass
    
    - name: Add host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    # - name: Deploy via SSH with expect
    #   run: |
    #     sudo apt-get update && sudo apt-get install -y expect
    #     expect -c "
    #       spawn ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \"cd www/jelezo.by/TEST && git pull origin main && chmod -R 755 assets/uploads\"
    #       expect \"password:\"
    #       send \"${{ secrets.SERVER_PASSWORD }}\n\"
    #       interact
    #     "

    - name: Deploy via SSH
      env:
        SSHPASS: ${{ secrets.SERVER_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "cd www/jelezo.by && \
          rm -rf TEST && \
          git clone https://github.com/${{ github.repository }}.git TEST && \
          cd TEST && chmod -R 755 assets/uploads"