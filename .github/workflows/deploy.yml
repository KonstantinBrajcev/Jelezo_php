name: Deploy to Server

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Upload via SFTP (stable)
      uses: milanmk/actions-file-deployer@master
      with:
        remote-protocol: "sftp"
        remote-host: ${{ secrets.SERVER_HOST }}
        remote-user: ${{ secrets.SSH_USERNAME }}
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        remote-port: ${{ secrets.SERVER_PORT }}
        local-path: "./"
        remote-path: "www/jelezo.by"
        sync: "full"
        debug: "true"
    
    - name: Set permissions
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd www/jelezo.by
          chmod -R 755 assets/uploads 2>/dev/null || true
          echo "✅ Deployed at $(date)" > deployment.log